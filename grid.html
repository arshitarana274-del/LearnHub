<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
      .grid-item {
        background-color: black;
        padding: 20px;
      }
      .grids {
        display: grid;
        grid-template-columns: auto auto auto;
        gap: 10px;
      }
      .grid-item-1 {
        background-color: black;
        padding: 20px;
      }
      .grid-item-1 {
        background-color: black;
        padding: 20px;
        grid-column: 1/3;
        grid-row: 1/3;
      }
    </style>
  </head>
  <body>
    <div class="grids">
      <div class="grid-item-1">1</div>
      <div class="grid-item">2</div>
      <div class="grid-item">3</div>
      <div class="grid-item">4</div>
    </div>
  </body>
</html>
